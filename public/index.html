<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mutum Delivery • Painel Admin</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="app-booting">
    <div id="bootSplash" class="boot-splash">
      <div class="boot-card">
        <div class="boot-spinner" aria-hidden="true"></div>
        <strong>Carregando o painel admin</strong>
        <span id="bootSplashText">Validando sua sessão e preparando o dashboard.</span>
      </div>
    </div>
    <div id="globalLoader" class="global-loader hidden" aria-live="polite">
      <div class="global-loader-card">
        <div class="boot-spinner" aria-hidden="true"></div>
        <strong>Processando</strong>
        <span id="globalLoaderText">Aguarde um instante...</span>
      </div>
    </div>
    <div id="app"></div>

    <template id="loginTemplate">
      <div class="auth-shell">
        <div class="auth-card">
          <div class="auth-topline"></div>
          <div class="brand auth-brand">
            <div class="brand-mark">MD</div>
            <div>
              <h1>Painel Admin</h1>
              <p>Entre com uma conta administradora para gerenciar a base do delivery.</p>
            </div>
          </div>
          <form id="loginForm" class="auth-form">
            <label>E-mail</label>
            <input name="email" type="email" placeholder="admin@exemplo.com" required />
            <label>Senha</label>
            <input name="password" type="password" placeholder="Sua senha" required />
            <button type="submit" class="btn-primary btn-block">Entrar</button>
          </form>
          <p id="loginError" class="form-error hidden"></p>
        </div>
      </div>
    </template>

    <template id="dashboardTemplate">
      <div class="page">
        <header class="topbar">
          <div class="brand">
            <div class="brand-mark">MD</div>
            <div>
              <strong>Mutum Delivery</strong>
              <span>Painel administrativo</span>
            </div>
          </div>
          <div class="topbar-actions">
            <span id="adminBadge" class="user-pill"></span>
            <button id="logoutBtn" class="btn-soft">Sair</button>
          </div>
        </header>

        <main class="dashboard">
          <section class="hero-card">
            <div>
              <h2>Gestão rápida</h2>
              <p>Crie contas de restaurante, cadastre restaurantes, organize localidades e feche o faturamento por período.</p>
            </div>
            <div class="hero-status" id="statusBox">Pronto.</div>
          </section>

          <section class="grid two-cols">
            <article class="panel-card">
              <div class="section-title">
                <h3>Conta de restaurante</h3>
                <p>Cria um usuário com papel RESTAURANT e já retorna os dados gerados pela API.</p>
              </div>
              <form id="restaurantAccountForm" class="stack-form">
                <div class="grid two-cols inner-grid">
                  <div>
                    <label>Nome do responsável</label>
                    <input name="ownerName" required />
                  </div>
                  <div>
                    <label>Telefone do responsável</label>
                    <input name="ownerPhone" />
                  </div>
                  <div>
                    <label>E-mail</label>
                    <input name="email" type="email" required />
                  </div>
                  <div>
                    <label>Senha</label>
                    <input name="password" type="password" minlength="6" required />
                  </div>
                  <div>
                    <label>Nome do restaurante</label>
                    <input name="restaurantName" required />
                  </div>
                  <div>
                    <label>Telefone do restaurante</label>
                    <input name="restaurantPhone" />
                  </div>
                  <div class="full">
                    <label>Endereço textual</label>
                    <input name="address" placeholder="Rua, número, bairro" required />
                  </div>
                  <div class="full">
                    <label>Descrição do restaurante</label>
                    <textarea name="restaurantDescription" rows="3"></textarea>
                  </div>
                  <div class="full">
                    <label>Logo URL</label>
                    <input name="restaurantLogoUrl" />
                  </div>
                  <div>
                    <label>Estado</label>
                    <select id="restaurantAccountState"></select>
                  </div>
                  <div>
                    <label>Cidade</label>
                    <select name="cityId" id="restaurantAccountCity"></select>
                  </div>
                </div>
                <button type="submit" class="btn-primary">Criar conta restaurante</button>
              </form>

              <div class="result-box">
                <div class="result-head">
                  <strong>Últimos cadastros</strong>
                  <button id="clearCreatedUsers" class="btn-link" type="button">Limpar</button>
                </div>
                <div id="createdUsersList" class="created-list empty-state">Nenhuma conta criada ainda.</div>
              </div>
            </article>

            <article class="panel-card">
              <div class="section-title">
                <h3>Criar restaurante por ownerId</h3>
                <p>Use quando já tiver um usuário RESTAURANT e quiser vincular um novo restaurante.</p>
              </div>
              <form id="restaurantForm" class="stack-form">
                <div class="grid two-cols inner-grid">
                  <div class="full">
                    <label>ownerId</label>
                    <input name="ownerId" id="restaurantOwnerId" placeholder="UUID do usuário RESTAURANT" required />
                  </div>
                  <div>
                    <label>Nome</label>
                    <input name="name" required />
                  </div>
                  <div>
                    <label>Telefone</label>
                    <input name="phone" />
                  </div>
                  <div class="full">
                    <label>Endereço textual</label>
                    <input name="address" required />
                  </div>
                  <div class="full">
                    <label>Descrição</label>
                    <textarea name="description" rows="3"></textarea>
                  </div>
                  <div class="full">
                    <label>Logo URL</label>
                    <input name="logoUrl" />
                  </div>
                  <div>
                    <label>Pedido mínimo</label>
                    <input name="minOrder" type="number" min="0" step="0.01" />
                  </div>
                  <div>
                    <label>Estado</label>
                    <select id="restaurantState"></select>
                  </div>
                  <div class="full">
                    <label>Cidade</label>
                    <select name="cityId" id="restaurantCity"></select>
                  </div>
                </div>
                <div class="row-wrap">
                  <button type="submit" class="btn-primary">Criar restaurante</button>
                  <button type="button" id="useLastOwnerBtn" class="btn-soft">Usar último ownerId</button>
                </div>
              </form>
            </article>
          </section>

          <section class="grid three-cols">
            <article class="panel-card">
              <div class="section-title">
                <h3>Estados</h3>
                <p>Cadastre novos estados.</p>
              </div>
              <form id="stateForm" class="stack-form compact-form">
                <label>Nome</label>
                <input name="name" required />
                <label>UF</label>
                <input name="code" maxlength="2" required />
                <button type="submit" class="btn-primary">Adicionar estado</button>
              </form>
              <div id="statesList" class="simple-list"></div>
            </article>

            <article class="panel-card">
              <div class="section-title">
                <h3>Cidades</h3>
                <p>Escolha o estado e crie uma nova cidade.</p>
              </div>
              <form id="cityForm" class="stack-form compact-form">
                <label>Estado</label>
                <select name="stateId" id="cityStateSelect"></select>
                <label>Nome da cidade</label>
                <input name="name" required />
                <button type="submit" class="btn-primary">Adicionar cidade</button>
              </form>
              <div id="citiesList" class="simple-list"></div>
            </article>

            <article class="panel-card">
              <div class="section-title">
                <h3>Bairros</h3>
                <p>Escolha a cidade e crie um novo bairro.</p>
              </div>
              <form id="neighborhoodForm" class="stack-form compact-form">
                <label>Estado</label>
                <select id="neighborhoodStateSelect"></select>
                <label>Cidade</label>
                <select name="cityId" id="neighborhoodCitySelect"></select>
                <label>Nome do bairro</label>
                <input name="name" required />
                <button type="submit" class="btn-primary">Adicionar bairro</button>
              </form>
              <div id="neighborhoodsList" class="simple-list"></div>
            </article>
          </section>

          <section class="panel-card">
            <div class="section-title">
              <h3>Resumo rápido</h3>
              <p>Os cadastros recentes ficam acessíveis aqui para copiar IDs com facilidade.</p>
            </div>
            <div id="summaryCards" class="summary-grid"></div>
          </section>

          <section class="panel-card">
            <div class="section-title">
              <h3>Categorias de loja</h3>
              <p>Crie as categorias que os restaurantes podem selecionar (ex.: Lanches, Açaí, Pizzas). Suba o ícone e defina a ordem de exibição.</p>
            </div>
            <form id="storeCategoryForm" class="stack-form">
              <div class="grid two-cols inner-grid">
                <div>
                  <label>Nome da categoria</label>
                  <input id="storeCategoryName" name="name" placeholder="Ex.: Lanches" required />
                </div>
                <div>
                  <label>Ordem de exibição</label>
                  <input id="storeCategorySortOrder" name="sortOrder" type="number" min="0" value="0" />
                </div>
                <div class="full">
                  <label>Ícone (URL) — preenchido automaticamente após upload</label>
                  <input id="storeCategoryIconUrl" name="iconUrl" placeholder="https://..." />
                </div>
                <div class="full">
                  <label>Upload do ícone (JPG / PNG / WEBP, máx. 300 KB)</label>
                  <div class="row-wrap">
                    <input id="storeCategoryIconFile" type="file" accept="image/*" class="hidden" />
                    <button type="button" id="uploadStoreCategoryIconBtn" class="btn-soft">Enviar ícone</button>
                    <div id="storeCategoryIconPreviewWrap" class="hidden">
                      <img id="storeCategoryIconPreview" alt="Pré-visualização" style="width:48px;height:48px;border-radius:8px;object-fit:cover;" />
                    </div>
                  </div>
                </div>
              </div>
              <button type="submit" class="btn-primary">Criar categoria</button>
            </form>
            <div id="storeCategoriesList" class="simple-list" style="margin-top:16px;"></div>
          </section>

          <section class="panel-card">
            <div class="section-title">
              <h3>Faturamento e fechamento</h3>
              <p>Selecione o período, desconte cancelados automaticamente, aplique a taxa de 7% e exporte em planilha CSV ou PDF.</p>
            </div>
            <form id="billingFilterForm" class="stack-form">
              <div class="grid two-cols inner-grid billing-grid">
                <div>
                  <label>Restaurante</label>
                  <select id="billingRestaurantId" required></select>
                </div>
                <div>
                  <label>Taxa (%)</label>
                  <input id="billingCommissionPercent" type="number" min="0" max="100" step="0.01" value="7" />
                </div>
                <div>
                  <label>Data inicial</label>
                  <input id="billingStartDate" type="date" required />
                </div>
                <div>
                  <label>Data final</label>
                  <input id="billingEndDate" type="date" required />
                </div>
                <div>
                  <label>Vencimento sugerido</label>
                  <input id="billingDueDate" type="date" />
                </div>
                <div>
                  <label>Observações do fechamento</label>
                  <input id="billingNotes" placeholder="Ex.: fechamento março, pagar via Pix" />
                </div>
              </div>
              <div class="row-wrap">
                <button type="submit" class="btn-primary">Gerar fechamento</button>
              </div>
            </form>

            <div id="billingReportMeta" class="billing-meta"></div>
            <div id="billingSummaryCards" class="summary-grid billing-summary-grid"></div>

            <div id="billingReportActions" class="row-wrap hidden report-actions">
              <button id="billingExportCsvBtn" type="button" class="btn-soft">Baixar planilha CSV</button>
              <button id="billingExportPdfBtn" type="button" class="btn-soft">Gerar PDF / imprimir</button>
              <button id="billingSaveCycleBtn" type="button" class="btn-primary">Salvar fechamento no backend</button>
            </div>

            <div class="report-table-wrap">
              <table class="report-table">
                <thead>
                  <tr>
                    <th>Linha</th>
                    <th>Pedido</th>
                    <th>Cliente</th>
                    <th>Status</th>
                    <th>Pagamento</th>
                    <th>Total</th>
                    <th>Cancelado</th>
                    <th>Base 7%</th>
                    <th>Comissão</th>
                  </tr>
                </thead>
                <tbody id="billingReportBody"></tbody>
              </table>
            </div>
          </section>
        </main>
      </div>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
