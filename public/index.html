<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mutum Delivery • Painel Admin</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="app-booting">
    <div id="bootSplash" class="boot-splash">
      <div class="boot-card">
        <div class="boot-spinner" aria-hidden="true"></div>
        <strong>Carregando o painel admin</strong>
        <span id="bootSplashText">Validando sua sessão e preparando o dashboard.</span>
      </div>
    </div>
    <div id="globalLoader" class="global-loader hidden" aria-live="polite">
      <div class="global-loader-card">
        <div class="boot-spinner" aria-hidden="true"></div>
        <strong>Processando</strong>
        <span id="globalLoaderText">Aguarde um instante...</span>
      </div>
    </div>
    <div id="app"></div>

    <template id="loginTemplate">
      <div class="auth-shell">
        <div class="auth-card">
          <div class="auth-topline"></div>
          <div class="brand auth-brand">
            <div class="brand-mark">MD</div>
            <div>
              <h1>Painel Admin</h1>
              <p>Entre com uma conta administradora para gerenciar a base do delivery.</p>
            </div>
          </div>
          <form id="loginForm" class="auth-form">
            <label>E-mail</label>
            <input name="email" type="email" placeholder="admin@exemplo.com" required />
            <label>Senha</label>
            <input name="password" type="password" placeholder="Sua senha" required />
            <button type="submit" class="btn-primary btn-block">Entrar</button>
          </form>
          <p id="loginError" class="form-error hidden"></p>
        </div>
      </div>
    </template>

    <template id="dashboardTemplate">
      <div class="page">
        <header class="topbar">
          <div class="brand">
            <div class="brand-mark">MD</div>
            <div>
              <strong>Mutum Delivery</strong>
              <span>Painel administrativo</span>
            </div>
          </div>
          <div class="topbar-actions">
            <span id="adminBadge" class="user-pill"></span>
            <button id="logoutBtn" class="btn-soft">Sair</button>
          </div>
        </header>

        <main class="dashboard-shell">
          <section class="nav-strip">
            <button type="button" class="nav-tab is-active" data-page="inicio">Início</button>
            <button type="button" class="nav-tab" data-page="restaurantes">Restaurantes</button>
            <button type="button" class="nav-tab" data-page="status">Status da aplicação</button>
          </section>

          <section class="status-banner">
            <div>
              <strong>Painel pronto</strong>
              <p id="statusText">Carregando os dados iniciais do admin...</p>
            </div>
            <span id="statusBadge" class="status-badge">Sincronizando</span>
          </section>

          <section class="page-panel" data-page-panel="inicio">
            <div class="page-head">
              <div>
                <h2>Início</h2>
                <p>Cadastre contas de restaurante, regiões, categorias e cupons promocionais em um só lugar.</p>
              </div>
            </div>

            <div class="grid layout-main">
              <article class="panel-card">
                <div class="section-title">
                  <h3>Criar conta de restaurante</h3>
                  <p>Cria o usuário RESTAURANT e o restaurante vinculado no mesmo fluxo.</p>
                </div>
                <form id="restaurantAccountForm" class="stack-form">
                  <div class="grid two-cols inner-grid">
                    <div>
                      <label>Nome do responsável</label>
                      <input name="ownerName" required />
                    </div>
                    <div>
                      <label>Telefone do responsável</label>
                      <input name="ownerPhone" />
                    </div>
                    <div>
                      <label>E-mail</label>
                      <input name="email" type="email" required />
                    </div>
                    <div>
                      <label>Senha</label>
                      <input name="password" type="password" minlength="6" required />
                    </div>
                    <div>
                      <label>Nome do restaurante</label>
                      <input name="restaurantName" required />
                    </div>
                    <div>
                      <label>Telefone do restaurante</label>
                      <input name="restaurantPhone" />
                    </div>
                    <div class="full">
                      <label>Endereço textual</label>
                      <input name="address" placeholder="Rua, número, bairro" required />
                    </div>
                    <div class="full">
                      <label>Descrição do restaurante</label>
                      <textarea name="restaurantDescription" rows="3"></textarea>
                    </div>
                    <div class="full">
                      <label>Logo URL</label>
                      <input name="restaurantLogoUrl" />
                    </div>
                    <div>
                      <label>Estado</label>
                      <select id="restaurantAccountState"></select>
                    </div>
                    <div>
                      <label>Cidade</label>
                      <select name="cityId" id="restaurantAccountCity"></select>
                    </div>
                  </div>
                  <button type="submit" class="btn-primary">Criar conta restaurante</button>
                </form>
              </article>

              <article class="panel-card side-card">
                <div class="section-title">
                  <h3>Últimos cadastros</h3>
                  <p>Copie o ID ou confira o restaurante que acabou de entrar na base.</p>
                </div>
                <div class="row-wrap section-actions compact-actions">
                  <button id="clearCreatedUsers" class="btn-link" type="button">Limpar histórico local</button>
                </div>
                <div id="createdUsersList" class="created-list empty-state">Nenhuma conta criada ainda.</div>
              </article>
            </div>

            <div class="grid cards-grid four-grid">
              <article class="panel-card compact-card">
                <div class="section-title">
                  <h3>Estados</h3>
                  <p>Cadastre novos estados.</p>
                </div>
                <form id="stateForm" class="stack-form compact-form">
                  <label>Nome</label>
                  <input name="name" required />
                  <label>UF</label>
                  <input name="code" maxlength="2" required />
                  <button type="submit" class="btn-primary">Adicionar estado</button>
                </form>
                <div id="statesList" class="simple-list"></div>
              </article>

              <article class="panel-card compact-card">
                <div class="section-title">
                  <h3>Cidades</h3>
                  <p>Escolha o estado e crie uma nova cidade.</p>
                </div>
                <form id="cityForm" class="stack-form compact-form">
                  <label>Estado</label>
                  <select name="stateId" id="cityStateSelect"></select>
                  <label>Nome da cidade</label>
                  <input name="name" required />
                  <button type="submit" class="btn-primary">Adicionar cidade</button>
                </form>
                <div id="citiesList" class="simple-list"></div>
              </article>

              <article class="panel-card compact-card">
                <div class="section-title">
                  <h3>Bairros</h3>
                  <p>Escolha a cidade e crie um novo bairro.</p>
                </div>
                <form id="neighborhoodForm" class="stack-form compact-form">
                  <label>Estado</label>
                  <select id="neighborhoodStateSelect"></select>
                  <label>Cidade</label>
                  <select name="cityId" id="neighborhoodCitySelect"></select>
                  <label>Nome do bairro</label>
                  <input name="name" required />
                  <button type="submit" class="btn-primary">Adicionar bairro</button>
                </form>
                <div id="neighborhoodsList" class="simple-list"></div>
              </article>

              <article class="panel-card compact-card">
                <div class="section-title">
                  <h3>Categorias de loja</h3>
                  <p>Crie as categorias que os restaurantes podem selecionar.</p>
                </div>
                <form id="storeCategoryForm" class="stack-form compact-form">
                  <label>Nome da categoria</label>
                  <input id="storeCategoryName" name="name" placeholder="Ex.: Lanches" required />
                  <label>Ordem de exibição</label>
                  <input id="storeCategorySortOrder" name="sortOrder" type="number" min="0" value="0" />
                  <label>Ícone (URL)</label>
                  <input id="storeCategoryIconUrl" name="iconUrl" placeholder="https://..." />
                  <div class="row-wrap compact-actions">
                    <input id="storeCategoryIconFile" type="file" accept="image/*" class="hidden" />
                    <button type="button" id="uploadStoreCategoryIconBtn" class="btn-soft">Enviar ícone</button>
                    <div id="storeCategoryIconPreviewWrap" class="hidden preview-wrap">
                      <img id="storeCategoryIconPreview" alt="Pré-visualização" />
                    </div>
                  </div>
                  <button type="submit" class="btn-primary">Criar categoria</button>
                </form>
                <div id="storeCategoriesList" class="simple-list"></div>
              </article>
            </div>

            <div class="grid two-cols split-grid">
              <article class="panel-card">
                <div class="section-title">
                  <h3>Criar cupom promocional</h3>
                  <p>Cadastre cupons da API admin com percentual, valor mínimo, teto e limite de usos.</p>
                </div>
                <form id="couponForm" class="stack-form">
                  <div class="grid two-cols inner-grid">
                    <div>
                      <label>Código</label>
                      <input name="code" maxlength="32" placeholder="PROMO10" required />
                    </div>
                    <div>
                      <label>Desconto (%)</label>
                      <input name="discountPercent" type="number" min="0.01" step="0.01" required />
                    </div>
                    <div>
                      <label>Teto do desconto</label>
                      <input name="maxDiscountAmount" type="number" min="0" step="0.01" value="0" required />
                    </div>
                    <div>
                      <label>Pedido mínimo</label>
                      <input name="minOrderAmount" type="number" min="0" step="0.01" value="0" required />
                    </div>
                    <div>
                      <label>Quantidade máxima de usos</label>
                      <input name="maxUses" type="number" min="1" step="1" value="1" required />
                    </div>
                    <div>
                      <label>Ativo</label>
                      <select name="isActive">
                        <option value="true">Sim</option>
                        <option value="false">Não</option>
                      </select>
                    </div>
                    <div>
                      <label>Início (opcional)</label>
                      <input name="startsAt" type="datetime-local" />
                    </div>
                    <div>
                      <label>Fim (opcional)</label>
                      <input name="endsAt" type="datetime-local" />
                    </div>
                  </div>
                  <button type="submit" class="btn-primary">Criar cupom</button>
                </form>
              </article>

              <article class="panel-card side-card">
                <div class="section-title">
                  <h3>Cupons recentes</h3>
                  <p>Veja rapidamente o que está ativo, inativo e quantos usos ainda restam.</p>
                </div>
                <div id="couponList" class="coupon-list empty-state">Nenhum cupom carregado.</div>
              </article>
            </div>
          </section>

          <section class="page-panel hidden" data-page-panel="restaurantes">
            <div class="page-head page-head-spread">
              <div>
                <h2>Restaurantes</h2>
                <p>Veja toda a base e faça a desativação forçada pelo admin.</p>
              </div>
              <div class="notice-card inline-note">
                <strong>Observação importante</strong>
                <span>A API atual permite que o restaurante também altere o próprio status. O bloqueio irreversível depende de ajuste no backend.</span>
              </div>
            </div>

            <div class="panel-card">
              <div class="toolbar">
                <div class="toolbar-field">
                  <label>Buscar restaurante</label>
                  <input id="restaurantSearchInput" placeholder="Nome, telefone ou cidade" />
                </div>
                <div class="toolbar-field small-field">
                  <label>Status</label>
                  <select id="restaurantStatusFilter">
                    <option value="all">Todos</option>
                    <option value="active">Ativos</option>
                    <option value="inactive">Inativos</option>
                  </select>
                </div>
                <button type="button" id="refreshRestaurantsBtn" class="btn-soft">Atualizar lista</button>
              </div>

              <div id="restaurantAdminStats" class="summary-grid compact-summary"></div>
              <div id="restaurantList" class="restaurant-list empty-state">Nenhum restaurante encontrado.</div>
            </div>
          </section>

          <section class="page-panel hidden" data-page-panel="status">
            <div class="page-head page-head-spread">
              <div>
                <h2>Status da aplicação</h2>
                <p>Visão rápida da operação com base nos dados disponíveis hoje na API.</p>
              </div>
              <button type="button" id="refreshStatusBtn" class="btn-primary">Atualizar métricas</button>
            </div>

            <div class="notice-card">
              <strong>Como esta tela calcula os números</strong>
              <span>Restaurantes vêm da API oficial. Pedidos do dia, semana e mês são agregados a partir dos pedidos de cada restaurante. O total geral de usuários ainda depende de um endpoint dedicado no backend.</span>
            </div>

            <div id="appStatusCards" class="summary-grid status-summary"></div>
            <div class="grid two-cols split-grid">
              <article class="panel-card">
                <div class="section-title">
                  <h3>Saúde da base</h3>
                  <p>Indicadores simples para acompanhar volume e disponibilidade.</p>
                </div>
                <div id="statusHighlights" class="simple-list"></div>
              </article>
              <article class="panel-card">
                <div class="section-title">
                  <h3>Leitura operacional</h3>
                  <p>Resumo textual para bater o olho e entender o momento do app.</p>
                </div>
                <div id="statusNarrative" class="narrative-card"></div>
              </article>
            </div>
          </section>
        </main>
      </div>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
